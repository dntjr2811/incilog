services:

  nginx:
    image: nginx:alpine
    container_name: incilog-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - incilog-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: incilog-frontend
    environment:
      - REACT_APP_API_URL=/api
    networks:
      - incilog-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: incilog-backend
    environment:
      - DATABASE_URL=postgresql://incilog:incilog_pass@db:5432/incilog
      - TZ=Asia/Tokyo
    depends_on:
      db:
        condition: service_healthy
    networks:
      - incilog-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: incilog-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=incilog
      - POSTGRES_PASSWORD=incilog_pass
      - POSTGRES_DB=incilog
      - TZ=Asia/Tokyo
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    networks:
      - incilog-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incilog"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    driver: local

networks:
  incilog-net:
    driver: bridge
